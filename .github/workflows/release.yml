name: Create release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Bundle files
        run: |
          mkdir -p staging/pulsar-weed
          rsync -a --exclude='.github' --exclude='node_modules' --exclude='staging' . staging/pulsar-weed/
          cd staging && zip -r ../pulsar-weed.zip pulsar-weed/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "PULSAR-WEED ${{ github.ref_name }}"
          body: |
            ![Pulsar Framework](https://r2.fivemanage.com/GPYOH8Hq4GPyAY7czrgLe/pulsarbanner.png)

            ## PULSAR-WEED ${{ github.ref_name }}

            Weed cultivation and drug operation system for Pulsar Framework.

            ### Installation
            1. Download `pulsar-weed.zip` below
            2. Extract into your server's `resources` folder
            3. Add `ensure pulsar-weed` to your `server.cfg`

            ---
            ![Pulsar Framework](https://img.shields.io/badge/Pulsar-Framework-7c3aed?style=flat-square)
            ![Built for FiveM](https://img.shields.io/badge/Built_for-FiveM-F40552?style=flat-square)
          files: pulsar-weed.zip
          prerelease: false
